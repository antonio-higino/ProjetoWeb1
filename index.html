<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PokéTeam Builder</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>PokéTeam Builder</h1>

    <div class="card">
      <h2>Selecionar Pokémon</h2>
      <div class="row">
        <input id="pokemonInput" placeholder="Digite o nome do Pokémon" />
        <button onclick="addPokemon()">Adicionar</button>
      </div>
    </div>

    <div class="card">
      <h2>Seu Time</h2>
      <div id="team" class="grid"></div>
    </div>

    <div class="card">
      <h2>Equilíbrio de Tipos no Time</h2>
      <div id="overview" class="grid"></div>
    </div>

    <div class="card">
      <h2>Recomendações</h2>
      <div id="recommendations" class="recommendations"></div>
    </div>

    <button onclick="generateTeam()">Gerar Times Balanceados</button>
  </div>

  <script src="js/index.js"></script>
</body>
</html>
